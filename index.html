<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task List App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px 0;
      min-height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .task-input {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    #taskInput, #prioritySelect, #dueDateInput {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      flex: 1;
    }

    #addBtn {
      padding: 10px 20px;
      border: none;
      background-color: #28a745;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    #addBtn:hover {
      background-color: #218838;
    }

    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      background: #f0f0f0;
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid #ddd;
    }

    .search-bar svg {
      flex-shrink: 0;
      color: #888;
    }

    #searchInput {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 14px;
      color: #333;
    }

    #searchInput::placeholder {
      color: #aaa;
    }

    .no-results {
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 20px 0;
      display: none;
    }

    /* Task Cards */
    .task-list-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      padding: 12px 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .task-info {
      display: flex;
      flex-direction: column;
    }

    .task-name {
      font-weight: 500;
      font-size: 16px;
    }

    .priority-badge.high {
      background-color: red;
      color: white;
      font-weight: bold;
      padding: 3px 6px;
      border-radius: 5px;
      margin-top: 4px;
      width: fit-content;
    }

    .priority-badge.low {
      background-color: green;
      color: white;
      font-weight: bold;
      padding: 3px 6px;
      border-radius: 5px;
      margin-top: 4px;
      width: fit-content;
    }

    .due-date {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    .delete-btn {
      background-color: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background-color: darkred;
    }

    mark {
      background-color: #ffe066;
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task List</h1>

    <!-- Task Input -->
    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <select id="prioritySelect">
        <option value="Normal">Normal</option>
        <option value="High">High</option>
      </select>
      <input type="date" id="dueDateInput">
      <button id="addBtn">Add Task</button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search tasks...">
    </div>

    <!-- Task List -->
    <div id="taskList"></div>
    <div class="no-results" id="noResults">No tasks match your search.</div>
  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const prioritySelect = document.getElementById("prioritySelect");
    const dueDateInput = document.getElementById("dueDateInput");
    const searchInput = document.getElementById("searchInput");
    const noResults = document.getElementById("noResults");

    // Store tasks as data
    let tasks = [];

    function addTask() {
      const taskText = taskInput.value.trim();
      const priority = prioritySelect.value;
      const dueDate = dueDateInput.value;

      if (!taskText) {
        alert("Please enter a task!");
        return;
      }

      tasks.push({ text: taskText, priority, dueDate });
      renderTasks(searchInput.value.trim());

      taskInput.value = "";
      prioritySelect.value = "Normal";
      dueDateInput.value = "";
    }

    function highlight(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }

    function renderTasks(query = "") {
      taskList.innerHTML = "";
      const lowerQuery = query.toLowerCase();
      const filtered = tasks.filter(t => t.text.toLowerCase().includes(lowerQuery));

      noResults.style.display = filtered.length === 0 && tasks.length > 0 ? "block" : "none";

      filtered.forEach((task, idx) => {
        const card = document.createElement("div");
        card.className = "task-list-card";

        const taskInfo = document.createElement("div");
        taskInfo.className = "task-info";

        const taskName = document.createElement("span");
        taskName.className = "task-name";
        taskName.innerHTML = highlight(task.text, query);

        const priorityBadge = document.createElement("span");
        priorityBadge.className = "priority-badge " + (task.priority === "High" ? "high" : "low");
        priorityBadge.textContent = task.priority;

        const dueDateSpan = document.createElement("span");
        dueDateSpan.className = "due-date";
        dueDateSpan.textContent = task.dueDate ? "Due: " + task.dueDate : "";

        taskInfo.appendChild(taskName);
        taskInfo.appendChild(priorityBadge);
        taskInfo.appendChild(dueDateSpan);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => {
          // Find and remove from tasks array by matching original index
          const originalIdx = tasks.indexOf(task);
          tasks.splice(originalIdx, 1);
          renderTasks(searchInput.value.trim());
        };

        card.appendChild(taskInfo);
        card.appendChild(deleteBtn);
        taskList.appendChild(card);
      });
    }

    // Live search
    searchInput.addEventListener("input", () => {
      renderTasks(searchInput.value.trim());
    });

    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keypress", e => { if (e.key === "Enter") addTask(); });
  </script>
</body>
</html>
